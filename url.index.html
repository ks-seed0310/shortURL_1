<script type="module">
const url = new URL(location.href)
const u_p = new URLSearchParams(location.search)
const rsp = await fetch("./json_url.json")
const ujs = await rsp.json()
const upp = u_p.getAll("url").length === 1 
  ? u_p.get("url").split(/\\\/\x1f\\\//gi) 
  : u_p.getAll("url");
const reu = upp.reduce((acc, cur) => acc?.[cur], ujs)
document.body.innerHTML = "お待ち下さい..."
setTimeout(() => {
  if (reu && reu.startsWith("data:")) {
    document.body.innerHTML = `<img src="${reu}" style="max-width:100%;">`;
  } else if (reu) {
    globalThis.location.replace(reu);
  }
}, 5000);
</script>

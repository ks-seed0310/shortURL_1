<script>
!async function(){
const dte = new Date().getTime()
const fuc = `./config.json?${dte}`
let cfg,cjs
try{
cfg = await fetch(fuc)
cjs = await cfg.json()
}catch(e){cjs={}}
const config = {
  dataurl:cjs.datapath??"./data.json",
  paramsKey:cjs.paramskey??"url",
  delimiter:new RegExp(cjs.delimiter)??/\\\/\x1f\\\//gi, /*%5C%2F%1F%5C%2F*/
  loadSecond:Number(cjs.loadTimeSec)??10,
  loadtimeInterval:Number(cjs.loadInterSec)??1,
  defaultloadScreenMessage:cjs.defaultScreenMsg??"お待ち下さい..."
}
const slp = function(ms){return new Promise((resolve,reject)=>setTimeout(resolve,ms))}
const url = new URL(location.href)
const u_p = new URLSearchParams(location.search)
const ftu = `${config.dataurl}${dte}`
const rsp = await fetch(ftu)
const ujs = await rsp.json()
const upp = u_p.getAll(config.paramsKey).length === 1 
  ? u_p.get(config.paramsKey).split(config.delimiter)
  : u_p.getAll(config.paramsKey);
const reu = upp.reduce((acc, cur) => acc?.[cur], ujs)
const bdy = function(d){document.body.innerHTML=`<p>${config.defaultloadScreenMessage} ${d?"("+d+")":""}</p>`}
console.log(url,u_p,ftu,rsp,ujs,upp,reu)
bdy()
for (let i=config.loadSecond;i>=0;i--){
  await slp(config.loadtimeInterval)
  bdy(String(i))
}
  
setTimeout(() => {
  if (reu && reu.startsWith("data:")) {
    document.body.innerHTML = `<img src="${reu}" style="max-width:100%;">`;
  } else if (reu) {
    globalThis.location.replace(reu);
  }
},0);
}()
</script>
